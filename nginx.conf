upstream hrc_crm_backend {
    server 127.0.0.1:8000 fail_timeout=0;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name crm.hrccosmos.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name crm.hrccosmos.com;

    # SSL (Certbot)
    ssl_certificate     /etc/letsencrypt/live/crm.hrccosmos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.hrccosmos.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # NOTE: No CORS headers here — Django (django-cors-headers) handles CORS.
    # Adding them in both places causes duplicate headers and browser errors.

    # Logs
    access_log /var/www/hrc-crm-backend/logs/nginx_access.log;
    error_log  /var/www/hrc-crm-backend/logs/nginx_error.log warn;

    client_max_body_size 20M;

    # GZIP
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # Block sensitive files
    location ~ /\.(env|git|htaccess) {
        deny all;
    }

    # Static files
    location /static/ {
        alias /var/www/hrc-crm-backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files
    location /media/ {
        alias /var/www/hrc-crm-backend/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Main app
    location / {
        # Handle OPTIONS preflight here, inside location block
        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass         http://hrc_crm_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    120s;
    }
}
