# Nginx configuration for HRC CRM Backend
# File location on server: /etc/nginx/sites-available/hrc-crm-backend
# Symlink: ln -s /etc/nginx/sites-available/hrc-crm-backend /etc/nginx/sites-enabled/

upstream hrc_crm_backend {
    server 127.0.0.1:8000 fail_timeout=0;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name crm.hrccosmos.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name crm.hrccosmos.com;

    # SSL — replace with your actual cert paths (e.g. from Certbot/Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/crm.hrccosmos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.hrccosmos.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Project root
    root /var/www/hrc-crm-backend;

    # Logs
    access_log /var/www/hrc-crm-backend/logs/nginx_access.log combined;
    error_log  /var/www/hrc-crm-backend/logs/nginx_error.log warn;

    client_max_body_size 20M;

    # Static files (served directly by Nginx)
    location /static/ {
        alias /var/www/hrc-crm-backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files
    location /media/ {
        alias /var/www/hrc-crm-backend/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Proxy all other requests to Gunicorn
    location / {
        proxy_pass         http://hrc_crm_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }
}
