# HTTP to HTTPS redirect
server {
    listen 80;
    server_name crm.hrccosmos.com;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name crm.hrccosmos.com;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/crm.hrccosmos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.hrccosmos.com/privkey.pem;
    
    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 20M;

    location /static/ {
        alias /var/www/hrc-crm-backend/staticfiles/;
    }

    location /media/ {
        alias /var/www/hrc-crm-backend/media/;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
